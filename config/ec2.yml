runtime:
  sample_mode: false
  sample_row_limit: null

spark:
  app_name_prefix: anti-scraping-ec2
  master: local[*]
  shuffle_partitions: 32
  driver_memory: 8g
  executor_memory: 8g
  default_parallelism: 8

paths:
  base_uri: s3a://anti-scraping-soomin/anti-scraping
  raw_text_input: /opt/anti-scraping/data/access.log
  normalized_events: s3a://anti-scraping-soomin/anti-scraping/normalized_events
  quarantined_raw_events: s3a://anti-scraping-soomin/anti-scraping/quarantined_raw_events
  sessionized_events: s3a://anti-scraping-soomin/anti-scraping/sessionized_events
  session_features: s3a://anti-scraping-soomin/anti-scraping/session_features
  suspicious_sessions: s3a://anti-scraping-soomin/anti-scraping/suspicious_sessions
  daily_abuse_summary: s3a://anti-scraping-soomin/anti-scraping/daily_abuse_summary
  daily_abuse_summary_sample_json: s3a://anti-scraping-soomin/anti-scraping/daily_abuse_summary_sample_json
